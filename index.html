<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SnapSeeker</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- Custom Windows-style draggable title bar -->
  <div class="title-bar">
    <span class="title-bar-text">SnapSeeker</span>
  </div>

  <div class="app-container">
    
    <!-- Header -->
    <header class="app-header">
      <h1>SnapSeeker</h1>
      <p class="subtitle">Search for text inside local screenshots and images</p>
    </header>

    <!-- Configuration Panel -->
    <section class="config-panel">
      <div class="form-group">
        <label for="folder-path">Folder location</label>
        <div class="input-with-button">
          <input type="text" id="folder-path" readonly placeholder="Select folder...">
          <button id="browse-btn" class="btn secondary-btn">Choose</button>
        </div>
      </div>

      <div class="form-group">
        <div class="label-row">
          <label for="keyword-input">Keywords</label>
          <div class="tooltip-container">
            <svg class="eye-icon" viewBox="0 0 24 24" width="14" height="14" stroke="currentColor" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
              <circle cx="12" cy="12" r="3"></circle>
            </svg>
            <span class="tooltip-text">Type a comma to separate keywords</span>
          </div>
        </div>
        <div class="tags-input-container" id="tags-container">
          <div class="tags-list" id="tags-list"></div>
          <input type="text" id="keyword-input" placeholder="Type to add...">
        </div>
      </div>
    </section>

    <!-- Controls & Progress -->
    <section class="control-panel">
      <div class="button-group">
        <button id="start-btn" class="btn primary-btn">Search</button>
        <button id="stop-btn" class="btn danger-btn" disabled>Stop</button>
      </div>

      <div class="progress-container">
        <div class="progress-bar-wrapper">
          <div id="progress-bar" class="progress-bar-fill" style="width: 0%;"></div>
        </div>
        <span id="status-text">Ready</span>
      </div>
    </section>

    <!-- Results Panel -->
    <section class="results-panel">
      <!-- Left Column: Matches thumbnail grid -->
      <div class="results-list-container">
        <h3>Matches</h3>
        <div id="matches-grid" class="matches-grid">
          <!-- Dynamically populated thumbnail cards -->
        </div>
      </div>

      <!-- Right Column: Text content preview -->
      <div class="preview-container">
        <h3>Preview text</h3>
        <div class="preview-box">
          <div id="preview-metadata" class="preview-metadata">
            <!-- Metadata here -->
          </div>
          <hr class="preview-divider">
          <pre id="preview-text" class="preview-text">Select an image to view text.</pre>
        </div>
      </div>
    </section>

    <!-- Footer -->
    <footer class="app-footer">
      <p>Double-click an item in the list to open it.</p>
    </footer>

  </div>

  <script src="renderer.js"></script>
</body>
</html>
